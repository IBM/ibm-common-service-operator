apiVersion: batch/v1
kind: Job
metadata:
  name: ibm-pg-migration-job
  namespace: {{ .Values.global.operatorNamespace }}
  annotations:
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "3"
spec:
  template:
    spec:
      containers:
      - name: ibm-pg-migration-job
        image: {{ .Values.cpfs.imagePullPrefix | default .Values.global.imagePullPrefix }}/{{ .Values.cpfs.imageRegistryNamespaceOperand }}/cpfs-utils:latest
        # Resource requests/limits to satisfy Kyverno
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        # Harden container security
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        command:
          - bash
          - -c
          - |
            echo "Starting IBM PG OLM to Helm migration cleanup..."
            operatorNamespace={{ .Values.global.operatorNamespace }}
            servicesNamespace={{ .Values.global.instanceNamespace }}
            skipIBMPGMigration={{ .Values.cpfs.skipIBMPGMigration }}
            namespaces=$(oc get cm namespace-scope -n $operatorNamespace -o jsonpath="{.data.namespaces}")

            if [[ "$skipIBMPGMigration" == "true" ]]; then
              echo "Skipping IBM PG operator cleanup as skipIBMPGMigration is set to true."
              exit 0
            fi

            echo "Cleaning up OLM-based IBM PG operator resources..."
            
            # Delete IBM PG operator subscription and CSV
            ibmPGSub=$(oc get subscription.operators.coreos.com -n "$operatorNamespace" -o jsonpath="{.items[?(@.spec.name=='ibm-pg-operator')].metadata.name}")
            if [[ -z $ibmPGSub ]]; then
              echo "IBM PG Subscription not present in operator namespace $operatorNamespace, skipping deleting Subscription and CSV."
            else
              ibmPGCSV=$(oc get --ignore-not-found subscription.operators.coreos.com $ibmPGSub -n $operatorNamespace -o jsonpath='{.status.currentCSV}')
              echo "Deleting IBM PG CSV and Subscription in operator namespace $operatorNamespace..."
              oc delete --ignore-not-found csv $ibmPGCSV -n $operatorNamespace && oc delete --ignore-not-found subscription.operators.coreos.com $ibmPGSub -n $operatorNamespace
            fi

            # Clean up IBM PG operator roles and rolebindings in all namespaces
            echo "Cleaning up IBM PG operator roles and rolebindings in namespaces $namespaces..."
            for ns in ${namespaces//,/ }; do
                echo "Processing namespace $ns for IBM PG cleanup..."
                roles=""
                
                # Get IBM PG operator roles
                roles="${roles} $(oc get roles -n $ns | grep ibm-pg-operator | awk '{print $1}' | tr "\n" " ")"
                
                # Get IBM PG service accounts (skip services namespace as it may be needed)
                if [[ $ns != $servicesNamespace ]]; then
                    ibmPGSA=$(oc get sa -n $ns --ignore-not-found | grep ibm-pg-operator | awk '{print $1}' | tr "\n" " ")
                    if [[ ${ibmPGSA// /} != "" ]]; then
                      echo "Deleting IBM PG service accounts in namespace $ns: $ibmPGSA"
                      oc delete sa $ibmPGSA -n $ns --ignore-not-found
                    fi
                fi

                if [[ -z ${roles// /} ]]; then
                  echo "No IBM PG roles present in namespace $ns, skipping..."
                else
                  echo "IBM PG roles to delete: ${roles}"
                  oc delete role $roles -n $ns --ignore-not-found
                  oc delete rolebindings $roles -n $ns --ignore-not-found
                fi
                echo "Namespace $ns IBM PG cleanup complete."
            done

            echo "IBM PG OLM to Helm migration cleanup completed successfully."
            oc delete serviceaccount ibm-pg-migration-job-sa -n $operatorNamespace --ignore-not-found
      restartPolicy: Never
      serviceAccount: ibm-pg-migration-job-sa
      imagePullSecrets:
      - name: {{ .Values.global.imagePullSecret }}

