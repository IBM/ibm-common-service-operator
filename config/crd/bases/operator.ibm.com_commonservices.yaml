---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  labels:
    foundationservices.cloudpak.ibm.com: crd
  name: commonservices.operator.ibm.com
spec:
  group: operator.ibm.com
  names:
    kind: CommonService
    listKind: CommonServiceList
    plural: commonservices
    singular: commonservice
  scope: Namespaced
  versions:
  - name: v3
    schema:
      openAPIV3Schema:
        description: |-
          CommonService is the Schema for the commonservices API. This API is used to
          configure general foundational services configurations, such as sizing,
          catalogsource, etc. See description of fields for more details. An instance
          of this CRD is automatically created by the ibm-common-service-operator upon
          installation to trigger the installation of critical installer components
          such as operand-deployment-lifecycle-manager (ODLM), which is required to
          further install other services from foundational services, such as IM.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CommonServiceSpec defines the desired state of CommonService
            properties:
              BYOCACertificate:
                description: |-
                  BYOCACertificate enables the option to replace the cs-ca-certificate with
                  your own CA certificate
                type: boolean
              autoScaleConfig:
                description: AutoScaleConfig is a bool to enable or disable HPA
                type: boolean
              catalogName:
                description: |-
                  CatalogName is the name of the CatalogSource that will be used for ODLM
                  and other services in foundational services
                type: string
              catalogNamespace:
                description: |-
                  CatalogNamespace is the namespace of the CatalogSource that will be used
                  for ODLM and other services in foundational services
                type: string
              csPostgreSQLReplica:
                description: |-
                  CSPostgreSQLReplica configures common-service-db as a replica cluster
                  When specified, enables streaming replication from primary cluster
                  Storage, certificates, and other settings remain CS operator defaults
                  IMPORTANT: Only ONE CSPostgreSQLReplica allowed per tenant (first-come-first-serve)
                properties:
                  bootstrap:
                    description: Bootstrap configuration for initial data sync via
                      pg_basebackup
                    properties:
                      initdb:
                        description: Bootstrap the cluster via initdb
                        properties:
                          builtinLocale:
                            description: |-
                              Specifies the locale name when the builtin provider is used.
                              This option requires `localeProvider` to be set to `builtin`.
                              Available from PostgreSQL 17.
                            type: string
                          dataChecksums:
                            description: |-
                              Whether the `-k` option should be passed to initdb,
                              enabling checksums on data pages (default: `false`)
                            type: boolean
                          database:
                            description: 'Name of the database used by the application.
                              Default: `app`.'
                            type: string
                          encoding:
                            description: The value to be passed as option `--encoding`
                              for initdb (default:`UTF8`)
                            type: string
                          icuLocale:
                            description: |-
                              Specifies the ICU locale when the ICU provider is used.
                              This option requires `localeProvider` to be set to `icu`.
                              Available from PostgreSQL 15.
                            type: string
                          icuRules:
                            description: |-
                              Specifies additional collation rules to customize the behavior of the default collation.
                              This option requires `localeProvider` to be set to `icu`.
                              Available from PostgreSQL 16.
                            type: string
                          import:
                            description: |-
                              Bootstraps the new cluster by importing data from an existing PostgreSQL
                              instance using logical backup (`pg_dump` and `pg_restore`)
                            properties:
                              databases:
                                description: The databases to import
                                items:
                                  type: string
                                type: array
                              pgDumpExtraOptions:
                                description: |-
                                  List of custom options to pass to the `pg_dump` command.

                                  IMPORTANT: Use with caution. The operator does not validate these options,
                                  and certain flags may interfere with its intended functionality or design.
                                  You are responsible for ensuring that the provided options are compatible
                                  with your environment and desired behavior.
                                items:
                                  type: string
                                type: array
                              pgRestoreDataOptions:
                                description: |-
                                  Custom options to pass to the `pg_restore` command during the `data`
                                  section. This setting overrides the generic `pgRestoreExtraOptions` value.

                                  IMPORTANT: Use with caution. The operator does not validate these options,
                                  and certain flags may interfere with its intended functionality or design.
                                  You are responsible for ensuring that the provided options are compatible
                                  with your environment and desired behavior.
                                items:
                                  type: string
                                type: array
                              pgRestoreExtraOptions:
                                description: |-
                                  List of custom options to pass to the `pg_restore` command.

                                  IMPORTANT: Use with caution. The operator does not validate these options,
                                  and certain flags may interfere with its intended functionality or design.
                                  You are responsible for ensuring that the provided options are compatible
                                  with your environment and desired behavior.
                                items:
                                  type: string
                                type: array
                              pgRestorePostdataOptions:
                                description: |-
                                  Custom options to pass to the `pg_restore` command during the `post-data`
                                  section. This setting overrides the generic `pgRestoreExtraOptions` value.

                                  IMPORTANT: Use with caution. The operator does not validate these options,
                                  and certain flags may interfere with its intended functionality or design.
                                  You are responsible for ensuring that the provided options are compatible
                                  with your environment and desired behavior.
                                items:
                                  type: string
                                type: array
                              pgRestorePredataOptions:
                                description: |-
                                  Custom options to pass to the `pg_restore` command during the `pre-data`
                                  section. This setting overrides the generic `pgRestoreExtraOptions` value.

                                  IMPORTANT: Use with caution. The operator does not validate these options,
                                  and certain flags may interfere with its intended functionality or design.
                                  You are responsible for ensuring that the provided options are compatible
                                  with your environment and desired behavior.
                                items:
                                  type: string
                                type: array
                              postImportApplicationSQL:
                                description: |-
                                  List of SQL queries to be executed as a superuser in the application
                                  database right after is imported - to be used with extreme care
                                  (by default empty). Only available in microservice type.
                                items:
                                  type: string
                                type: array
                              roles:
                                description: The roles to import
                                items:
                                  type: string
                                type: array
                              schemaOnly:
                                description: |-
                                  When set to true, only the `pre-data` and `post-data` sections of
                                  `pg_restore` are invoked, avoiding data import. Default: `false`.
                                type: boolean
                              source:
                                description: The source of the import
                                properties:
                                  externalCluster:
                                    description: The name of the externalCluster used
                                      for import
                                    type: string
                                required:
                                - externalCluster
                                type: object
                              type:
                                description: The import type. Can be `microservice`
                                  or `monolith`.
                                enum:
                                - microservice
                                - monolith
                                type: string
                            required:
                            - databases
                            - source
                            - type
                            type: object
                          locale:
                            description: Sets the default collation order and character
                              classification in the new database.
                            type: string
                          localeCType:
                            description: The value to be passed as option `--lc-ctype`
                              for initdb (default:`C`)
                            type: string
                          localeCollate:
                            description: The value to be passed as option `--lc-collate`
                              for initdb (default:`C`)
                            type: string
                          localeProvider:
                            description: |-
                              This option sets the locale provider for databases created in the new cluster.
                              Available from PostgreSQL 16.
                            type: string
                          options:
                            description: |-
                              The list of options that must be passed to initdb when creating the cluster.

                              Deprecated: This could lead to inconsistent configurations,
                              please use the explicit provided parameters instead.
                              If defined, explicit values will be ignored.
                            items:
                              type: string
                            type: array
                          owner:
                            description: |-
                              Name of the owner of the database in the instance to be used
                              by applications. Defaults to the value of the `database` key.
                            type: string
                          postInitApplicationSQL:
                            description: |-
                              List of SQL queries to be executed as a superuser in the application
                              database right after the cluster has been created - to be used with extreme care
                              (by default empty)
                            items:
                              type: string
                            type: array
                          postInitApplicationSQLRefs:
                            description: |-
                              List of references to ConfigMaps or Secrets containing SQL files
                              to be executed as a superuser in the application database right after
                              the cluster has been created. The references are processed in a specific order:
                              first, all Secrets are processed, followed by all ConfigMaps.
                              Within each group, the processing order follows the sequence specified
                              in their respective arrays.
                              (by default empty)
                            properties:
                              configMapRefs:
                                description: ConfigMapRefs holds a list of references
                                  to ConfigMaps
                                items:
                                  description: |-
                                    ConfigMapKeySelector contains enough information to let you locate
                                    the key of a ConfigMap
                                  properties:
                                    key:
                                      description: The key to select
                                      type: string
                                    name:
                                      description: Name of the referent.
                                      type: string
                                  required:
                                  - key
                                  - name
                                  type: object
                                type: array
                              secretRefs:
                                description: SecretRefs holds a list of references
                                  to Secrets
                                items:
                                  description: |-
                                    SecretKeySelector contains enough information to let you locate
                                    the key of a Secret
                                  properties:
                                    key:
                                      description: The key to select
                                      type: string
                                    name:
                                      description: Name of the referent.
                                      type: string
                                  required:
                                  - key
                                  - name
                                  type: object
                                type: array
                            type: object
                          postInitSQL:
                            description: |-
                              List of SQL queries to be executed as a superuser in the `postgres`
                              database right after the cluster has been created - to be used with extreme care
                              (by default empty)
                            items:
                              type: string
                            type: array
                          postInitSQLRefs:
                            description: |-
                              List of references to ConfigMaps or Secrets containing SQL files
                              to be executed as a superuser in the `postgres` database right after
                              the cluster has been created. The references are processed in a specific order:
                              first, all Secrets are processed, followed by all ConfigMaps.
                              Within each group, the processing order follows the sequence specified
                              in their respective arrays.
                              (by default empty)
                            properties:
                              configMapRefs:
                                description: ConfigMapRefs holds a list of references
                                  to ConfigMaps
                                items:
                                  description: |-
                                    ConfigMapKeySelector contains enough information to let you locate
                                    the key of a ConfigMap
                                  properties:
                                    key:
                                      description: The key to select
                                      type: string
                                    name:
                                      description: Name of the referent.
                                      type: string
                                  required:
                                  - key
                                  - name
                                  type: object
                                type: array
                              secretRefs:
                                description: SecretRefs holds a list of references
                                  to Secrets
                                items:
                                  description: |-
                                    SecretKeySelector contains enough information to let you locate
                                    the key of a Secret
                                  properties:
                                    key:
                                      description: The key to select
                                      type: string
                                    name:
                                      description: Name of the referent.
                                      type: string
                                  required:
                                  - key
                                  - name
                                  type: object
                                type: array
                            type: object
                          postInitTemplateSQL:
                            description: |-
                              List of SQL queries to be executed as a superuser in the `template1`
                              database right after the cluster has been created - to be used with extreme care
                              (by default empty)
                            items:
                              type: string
                            type: array
                          postInitTemplateSQLRefs:
                            description: |-
                              List of references to ConfigMaps or Secrets containing SQL files
                              to be executed as a superuser in the `template1` database right after
                              the cluster has been created. The references are processed in a specific order:
                              first, all Secrets are processed, followed by all ConfigMaps.
                              Within each group, the processing order follows the sequence specified
                              in their respective arrays.
                              (by default empty)
                            properties:
                              configMapRefs:
                                description: ConfigMapRefs holds a list of references
                                  to ConfigMaps
                                items:
                                  description: |-
                                    ConfigMapKeySelector contains enough information to let you locate
                                    the key of a ConfigMap
                                  properties:
                                    key:
                                      description: The key to select
                                      type: string
                                    name:
                                      description: Name of the referent.
                                      type: string
                                  required:
                                  - key
                                  - name
                                  type: object
                                type: array
                              secretRefs:
                                description: SecretRefs holds a list of references
                                  to Secrets
                                items:
                                  description: |-
                                    SecretKeySelector contains enough information to let you locate
                                    the key of a Secret
                                  properties:
                                    key:
                                      description: The key to select
                                      type: string
                                    name:
                                      description: Name of the referent.
                                      type: string
                                  required:
                                  - key
                                  - name
                                  type: object
                                type: array
                            type: object
                          secret:
                            description: |-
                              Name of the secret containing the initial credentials for the
                              owner of the user database. If empty a new secret will be
                              created from scratch
                            properties:
                              name:
                                description: Name of the referent.
                                type: string
                            required:
                            - name
                            type: object
                          walSegmentSize:
                            description: |-
                              The value in megabytes (1 to 1024) to be passed to the `--wal-segsize`
                              option for initdb (default: empty, resulting in PostgreSQL default: 16MB)
                            maximum: 1024
                            minimum: 1
                            type: integer
                        type: object
                        x-kubernetes-validations:
                        - message: builtinLocale is only available when localeProvider
                            is set to `builtin`
                          rule: '!has(self.builtinLocale) || self.localeProvider ==
                            ''builtin'''
                        - message: icuLocale is only available when localeProvider
                            is set to `icu`
                          rule: '!has(self.icuLocale) || self.localeProvider == ''icu'''
                        - message: icuRules is only available when localeProvider
                            is set to `icu`
                          rule: '!has(self.icuRules) || self.localeProvider == ''icu'''
                      pg_basebackup:
                        description: |-
                          Bootstrap the cluster taking a physical backup of another compatible
                          PostgreSQL instance
                        properties:
                          database:
                            description: 'Name of the database used by the application.
                              Default: `app`.'
                            type: string
                          owner:
                            description: |-
                              Name of the owner of the database in the instance to be used
                              by applications. Defaults to the value of the `database` key.
                            type: string
                          secret:
                            description: |-
                              Name of the secret containing the initial credentials for the
                              owner of the user database. If empty a new secret will be
                              created from scratch
                            properties:
                              name:
                                description: Name of the referent.
                                type: string
                            required:
                            - name
                            type: object
                          source:
                            description: The name of the server of which we need to
                              take a physical backup
                            minLength: 1
                            type: string
                        required:
                        - source
                        type: object
                      recovery:
                        description: Bootstrap the cluster from a backup
                        properties:
                          backup:
                            description: |-
                              The backup object containing the physical base backup from which to
                              initiate the recovery procedure.
                              Mutually exclusive with `source` and `volumeSnapshots`.
                            properties:
                              endpointCA:
                                description: |-
                                  EndpointCA store the CA bundle of the barman endpoint.
                                  Useful when using self-signed certificates to avoid
                                  errors with certificate issuer and barman-cloud-wal-archive.
                                properties:
                                  key:
                                    description: The key to select
                                    type: string
                                  name:
                                    description: Name of the referent.
                                    type: string
                                required:
                                - key
                                - name
                                type: object
                              name:
                                description: Name of the referent.
                                type: string
                            required:
                            - name
                            type: object
                          database:
                            description: 'Name of the database used by the application.
                              Default: `app`.'
                            type: string
                          owner:
                            description: |-
                              Name of the owner of the database in the instance to be used
                              by applications. Defaults to the value of the `database` key.
                            type: string
                          recoveryTarget:
                            description: |-
                              By default, the recovery process applies all the available
                              WAL files in the archive (full recovery). However, you can also
                              end the recovery as soon as a consistent state is reached or
                              recover to a point-in-time (PITR) by specifying a `RecoveryTarget` object,
                              as expected by PostgreSQL (i.e., timestamp, transaction Id, LSN, ...).
                              More info: https://www.postgresql.org/docs/current/runtime-config-wal.html#RUNTIME-CONFIG-WAL-RECOVERY-TARGET
                            properties:
                              backupID:
                                description: |-
                                  The ID of the backup from which to start the recovery process.
                                  If empty (default) the operator will automatically detect the backup
                                  based on targetTime or targetLSN if specified. Otherwise use the
                                  latest available backup in chronological order.
                                type: string
                              exclusive:
                                description: |-
                                  Set the target to be exclusive. If omitted, defaults to false, so that
                                  in Postgres, `recovery_target_inclusive` will be true
                                type: boolean
                              targetImmediate:
                                description: End recovery as soon as a consistent
                                  state is reached
                                type: boolean
                              targetLSN:
                                description: The target LSN (Log Sequence Number)
                                type: string
                              targetName:
                                description: |-
                                  The target name (to be previously created
                                  with `pg_create_restore_point`)
                                type: string
                              targetTLI:
                                description: The target timeline ("latest" or a positive
                                  integer)
                                type: string
                              targetTime:
                                description: |-
                                  The target time as a timestamp in RFC3339 format or PostgreSQL timestamp format.
                                  Timestamps without an explicit timezone are interpreted as UTC.
                                type: string
                              targetXID:
                                description: The target transaction ID
                                type: string
                            type: object
                          secret:
                            description: |-
                              Name of the secret containing the initial credentials for the
                              owner of the user database. If empty a new secret will be
                              created from scratch
                            properties:
                              name:
                                description: Name of the referent.
                                type: string
                            required:
                            - name
                            type: object
                          source:
                            description: |-
                              The external cluster whose backup we will restore. This is also
                              used as the name of the folder under which the backup is stored,
                              so it must be set to the name of the source cluster
                              Mutually exclusive with `backup`.
                            type: string
                          volumeSnapshots:
                            description: |-
                              The static PVC data source(s) from which to initiate the
                              recovery procedure. Currently supporting `VolumeSnapshot`
                              and `PersistentVolumeClaim` resources that map an existing
                              PVC group, compatible with CloudNativePG, and taken with
                              a cold backup copy on a fenced Postgres instance (limitation
                              which will be removed in the future when online backup
                              will be implemented).
                              Mutually exclusive with `backup`.
                            properties:
                              storage:
                                description: Configuration of the storage of the instances
                                properties:
                                  apiGroup:
                                    description: |-
                                      APIGroup is the group for the resource being referenced.
                                      If APIGroup is not specified, the specified Kind must be in the core API group.
                                      For any other third-party types, APIGroup is required.
                                    type: string
                                  kind:
                                    description: Kind is the type of resource being
                                      referenced
                                    type: string
                                  name:
                                    description: Name is the name of resource being
                                      referenced
                                    type: string
                                required:
                                - kind
                                - name
                                type: object
                                x-kubernetes-map-type: atomic
                              tablespaceStorage:
                                additionalProperties:
                                  description: |-
                                    TypedLocalObjectReference contains enough information to let you locate the
                                    typed referenced object inside the same namespace.
                                  properties:
                                    apiGroup:
                                      description: |-
                                        APIGroup is the group for the resource being referenced.
                                        If APIGroup is not specified, the specified Kind must be in the core API group.
                                        For any other third-party types, APIGroup is required.
                                      type: string
                                    kind:
                                      description: Kind is the type of resource being
                                        referenced
                                      type: string
                                    name:
                                      description: Name is the name of resource being
                                        referenced
                                      type: string
                                  required:
                                  - kind
                                  - name
                                  type: object
                                  x-kubernetes-map-type: atomic
                                description: Configuration of the storage for PostgreSQL
                                  tablespaces
                                type: object
                              walStorage:
                                description: Configuration of the storage for PostgreSQL
                                  WAL (Write-Ahead Log)
                                properties:
                                  apiGroup:
                                    description: |-
                                      APIGroup is the group for the resource being referenced.
                                      If APIGroup is not specified, the specified Kind must be in the core API group.
                                      For any other third-party types, APIGroup is required.
                                    type: string
                                  kind:
                                    description: Kind is the type of resource being
                                      referenced
                                    type: string
                                  name:
                                    description: Name is the name of resource being
                                      referenced
                                    type: string
                                required:
                                - kind
                                - name
                                type: object
                                x-kubernetes-map-type: atomic
                            required:
                            - storage
                            type: object
                        type: object
                    type: object
                  externalClusters:
                    description: ExternalClusters defines the primary cluster connection
                    items:
                      description: |-
                        ExternalCluster represents the connection parameters to an
                        external cluster which is used in the other sections of the configuration
                      properties:
                        barmanObjectStore:
                          description: The configuration for the barman-cloud tool
                            suite
                          properties:
                            azureCredentials:
                              description: The credentials to use to upload data to
                                Azure Blob Storage
                              properties:
                                connectionString:
                                  description: The connection string to be used
                                  properties:
                                    key:
                                      description: The key to select
                                      type: string
                                    name:
                                      description: Name of the referent.
                                      type: string
                                  required:
                                  - key
                                  - name
                                  type: object
                                inheritFromAzureAD:
                                  description: Use the Azure AD based authentication
                                    without providing explicitly the keys.
                                  type: boolean
                                storageAccount:
                                  description: The storage account where to upload
                                    data
                                  properties:
                                    key:
                                      description: The key to select
                                      type: string
                                    name:
                                      description: Name of the referent.
                                      type: string
                                  required:
                                  - key
                                  - name
                                  type: object
                                storageKey:
                                  description: |-
                                    The storage account key to be used in conjunction
                                    with the storage account name
                                  properties:
                                    key:
                                      description: The key to select
                                      type: string
                                    name:
                                      description: Name of the referent.
                                      type: string
                                  required:
                                  - key
                                  - name
                                  type: object
                                storageSasToken:
                                  description: |-
                                    A shared-access-signature to be used in conjunction with
                                    the storage account name
                                  properties:
                                    key:
                                      description: The key to select
                                      type: string
                                    name:
                                      description: Name of the referent.
                                      type: string
                                  required:
                                  - key
                                  - name
                                  type: object
                                useDefaultAzureCredentials:
                                  description: |-
                                    Use the default Azure authentication flow, which includes DefaultAzureCredential.
                                    This allows authentication using environment variables and managed identities.
                                  type: boolean
                              type: object
                            data:
                              description: |-
                                The configuration to be used to backup the data files
                                When not defined, base backups files will be stored uncompressed and may
                                be unencrypted in the object store, according to the bucket default
                                policy.
                              properties:
                                additionalCommandArgs:
                                  description: |-
                                    AdditionalCommandArgs represents additional arguments that can be appended
                                    to the 'barman-cloud-backup' command-line invocation. These arguments
                                    provide flexibility to customize the backup process further according to
                                    specific requirements or configurations.

                                    Example:
                                    In a scenario where specialized backup options are required, such as setting
                                    a specific timeout or defining custom behavior, users can use this field
                                    to specify additional command arguments.

                                    Note:
                                    It's essential to ensure that the provided arguments are valid and supported
                                    by the 'barman-cloud-backup' command, to avoid potential errors or unintended
                                    behavior during execution.
                                  items:
                                    type: string
                                  type: array
                                compression:
                                  description: |-
                                    Compress a backup file (a tar file per tablespace) while streaming it
                                    to the object store. Available options are empty string (no
                                    compression, default), `gzip`, `bzip2`, and `snappy`.
                                  enum:
                                  - bzip2
                                  - gzip
                                  - snappy
                                  type: string
                                encryption:
                                  description: |-
                                    Whenever to force the encryption of files (if the bucket is
                                    not already configured for that).
                                    Allowed options are empty string (use the bucket policy, default),
                                    `AES256` and `aws:kms`
                                  enum:
                                  - AES256
                                  - aws:kms
                                  type: string
                                immediateCheckpoint:
                                  description: |-
                                    Control whether the I/O workload for the backup initial checkpoint will
                                    be limited, according to the `checkpoint_completion_target` setting on
                                    the PostgreSQL server. If set to true, an immediate checkpoint will be
                                    used, meaning PostgreSQL will complete the checkpoint as soon as
